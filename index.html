<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asteroids</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    /* PixiJS inserta su propio <canvas>; lo estilizamos vía esta clase */
    #game canvas {
      display: block;
      border: 1px solid #222;
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <!-- PixiJS v8 (WebGL) vía CDN — expone el global `PIXI` -->
  <script src="https://pixijs.download/release/pixi.js"></script>

  <script src="game.js"></script>
</body>
</html>
